<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HC 1.2">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Hypertrophy Clusters 1.2</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --bg4: #2e2e2e;
    --border: #333;
    --text: #f0f0f0;
    --text2: #aaa;
    --text3: #666;
    --yellow: #f5c842;
    --yellow-bg: #2a2200;
    --yellow-border: #5a4800;
    --orange: #f5922a;
    --orange-bg: #2a1500;
    --orange-border: #5a3000;
    --red: #f54242;
    --red-bg: #2a0a0a;
    --red-border: #5a1010;
    --green: #4caf50;
    --blue: #4a9eff;
    --gray-bg: #1e1e1e;
    --gray-border: #333;
    --radius: 12px;
    --radius-sm: 8px;
    --nav-h: 64px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  #app-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
  }
  #header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  #header-phase { font-size: 12px; color: var(--yellow); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── NAV ── */
  #app-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    height: var(--nav-h);
    background: rgba(15,15,15,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; transition: color 0.15s; color: var(--text3);
    font-size: 10px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-tab.active { color: var(--yellow); }
  .nav-tab svg { width: 22px; height: 22px; }

  /* ── MAIN CONTENT ── */
  #app-main {
    padding-top: calc(var(--header-h) + 8px);
    padding-bottom: calc(var(--nav-h) + 16px);
    padding-left: 16px; padding-right: 16px;
    min-height: 100vh;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── TODAY VIEW ── */
  .today-hero {
    background: linear-gradient(135deg, #1a1500 0%, #2a1a00 100%);
    border: 1px solid var(--yellow-border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .today-hero .phase-badge {
    display: inline-block;
    background: var(--yellow);
    color: #000;
    font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
  }
  .today-hero h2 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .today-hero .subtitle { color: var(--text2); font-size: 14px; }
  .today-hero .start-btn {
    display: block; width: 100%; margin-top: 16px;
    background: var(--yellow); color: #000;
    border: none; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 800; letter-spacing: 0.3px;
    padding: 14px; cursor: pointer; transition: opacity 0.15s;
  }
  .today-hero .start-btn:active { opacity: 0.8; }

  .day-selector {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-bottom: 16px;
  }
  .day-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 4px;
    text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .day-btn.active { background: var(--yellow-bg); border-color: var(--yellow); }
  .day-btn .day-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-btn.active .day-label { color: var(--yellow); }
  .day-btn .day-name { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .day-btn.completed::after { content: '✓'; display: block; font-size: 14px; color: var(--green); margin-top: 2px; }

  .week-selector {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .week-btn {
    flex: 1; min-width: 0;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 4px;
    text-align: center; cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--text2); transition: all 0.15s; white-space: nowrap;
  }
  .week-btn.active { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
  .week-btn.completed { border-color: var(--green); color: var(--green); }

  /* ── EXERCISE CARDS ── */
  .exercise-section { margin-bottom: 8px; }
  .superset-group { position: relative; margin-bottom: 12px; }
  .superset-group .ss-connector {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 3px; background: var(--border); border-radius: 2px;
    bottom: 0; top: 0;
    pointer-events: none;
  }
  .superset-label {
    text-align: center; font-size: 10px; font-weight: 700; color: var(--text3);
    letter-spacing: 1px; text-transform: uppercase; padding: 4px 0; margin: -4px 0;
  }

  .ex-card {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg2);
    padding: 14px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }
  .ex-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .ex-card.cns { background: var(--gray-bg); border-color: var(--gray-border); }
  .ex-card.cns::before { background: var(--text3); }
  .ex-card.yellow { background: var(--yellow-bg); border-color: var(--yellow-border); }
  .ex-card.yellow::before { background: var(--yellow); }
  .ex-card.orange { background: var(--orange-bg); border-color: var(--orange-border); }
  .ex-card.orange::before { background: var(--orange); }
  .ex-card.red { background: var(--red-bg); border-color: var(--red-border); }
  .ex-card.red::before { background: var(--red); }

  .ex-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .ex-name { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; }
  .ex-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .cns .ex-badge { background: var(--bg4); color: var(--text3); }
  .yellow .ex-badge { background: rgba(245,200,66,0.2); color: var(--yellow); }
  .orange .ex-badge { background: rgba(245,146,42,0.2); color: var(--orange); }
  .red .ex-badge { background: rgba(245,66,66,0.2); color: var(--red); }

  .ex-meta {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .ex-meta span { font-size: 12px; color: var(--text2); }
  .ex-meta strong { color: var(--text); }

  .ex-notes { font-size: 12px; color: var(--text2); background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.5; }

  .ex-notes-toggle {
    font-size: 12px; font-weight: 700; color: var(--text3);
    cursor: pointer; padding: 4px 0; user-select: none;
    transition: color 0.15s;
  }
  .ex-notes-toggle.open { color: var(--yellow); }
  .ex-notes-toggle.open::before { content: '▾ '; }
  .ex-notes-body {
    display: none; font-size: 13px; color: var(--text2);
    line-height: 1.55; background: var(--bg3);
    border-left: 3px solid var(--border);
    border-radius: 0 6px 6px 0;
    padding: 10px 12px; margin-top: 4px; margin-bottom: 6px;
  }
  .ex-notes-body.open { display: block; }

  .ex-sets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .set-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; color: var(--text2); flex-shrink: 0;
  }
  .set-circle.done { background: var(--green); border-color: var(--green); color: #fff; }
  .set-circle.active-pulse { border-color: var(--yellow); color: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(245,200,66,0.4); } 50% { box-shadow: 0 0 0 6px rgba(245,200,66,0); } }

  .ex-weight {
    display: flex; align-items: center; gap: 8px;
  }
  .ex-weight label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .ex-weight input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 14px; font-weight: 600;
    padding: 6px 10px; width: 90px; text-align: center;
    outline: none; transition: border-color 0.15s;
  }
  .ex-weight input:focus { border-color: var(--yellow); }
  .ex-weight .weight-unit { font-size: 12px; color: var(--text3); }

  /* ── REST TIMER OVERLAY ── */
  #rest-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.92);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 32px;
  }
  #rest-overlay.show { display: flex; }
  #rest-title { font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
  #rest-exercise { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; }
  #rest-ring {
    position: relative; width: 180px; height: 180px;
  }
  #rest-ring svg { transform: rotate(-90deg); }
  #rest-ring circle.bg { fill: none; stroke: var(--bg3); stroke-width: 10; }
  #rest-ring circle.fg { fill: none; stroke: var(--yellow); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  #rest-count {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 900; color: var(--yellow);
  }
  #rest-skip {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); border-radius: var(--radius-sm);
    padding: 12px 32px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  #rest-skip:active { background: var(--bg4); }
  #rest-next { font-size: 13px; color: var(--text3); text-align: center; }

  /* ── PROGRAM VIEW ── */
  .phase-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
  }
  .phase-header {
    padding: 14px 16px; background: var(--bg3);
    display: flex; align-items: center; justify-content: space-between;
  }
  .phase-header h3 { font-size: 16px; font-weight: 800; }
  .phase-header .phase-weeks { font-size: 12px; color: var(--text2); }
  .phase-scheme {
    display: inline-block; background: var(--yellow); color: #000;
    font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 4px; margin-top: 4px;
  }
  .phase-days { padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .phase-day-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px; cursor: pointer; transition: all 0.15s;
  }
  .phase-day-card:hover { border-color: var(--yellow); }
  .phase-day-card .pdc-day { font-size: 11px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 0.5px; }
  .phase-day-card .pdc-name { font-size: 14px; font-weight: 700; margin-top: 2px; }
  .phase-day-card .pdc-count { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* ── HISTORY VIEW ── */
  .history-empty { text-align: center; padding: 48px 16px; color: var(--text3); }
  .history-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  }
  .history-item .hi-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .history-item .hi-date { font-size: 13px; font-weight: 700; }
  .history-item .hi-badge { font-size: 10px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 4px; }
  .history-item .hi-weights { display: flex; flex-direction: column; gap: 4px; }
  .history-item .hi-weight-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }
  .history-item .hi-weight-row strong { color: var(--text); }

  .chart-section { margin-bottom: 20px; }
  .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-wrap {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; overflow: hidden;
  }

  /* ── 1RM VIEW ── */
  .orm-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .orm-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .orm-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .orm-input-row label { font-size: 13px; color: var(--text2); flex: 1; }
  .orm-input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 16px; font-weight: 700;
    padding: 8px 12px; width: 100px; text-align: center; outline: none;
    transition: border-color 0.15s;
  }
  .orm-input:focus { border-color: var(--yellow); }
  .orm-calc-btn {
    background: var(--yellow); color: #000; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 800; padding: 10px 16px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .orm-calc-btn:active { opacity: 0.8; }
  .orm-result { display: none; }
  .orm-result.show { display: block; }
  .orm-1rm { font-size: 28px; font-weight: 900; color: var(--yellow); margin-bottom: 12px; }
  .orm-1rm span { font-size: 14px; color: var(--text2); font-weight: 600; }
  .orm-pcts { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .orm-pct-item { background: var(--bg3); border-radius: 6px; padding: 8px 4px; text-align: center; }
  .orm-pct-item .pct-label { font-size: 10px; color: var(--text3); font-weight: 600; }
  .orm-pct-item .pct-val { font-size: 15px; font-weight: 800; color: var(--text); margin-top: 2px; }

  /* ── SECTION HEADERS ── */
  .section-header {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; margin-top: 16px;
    padding-left: 2px;
  }

  /* ── COMPLETE WORKOUT BTN ── */
  .complete-workout-btn {
    display: block; width: 100%; margin-top: 20px;
    background: var(--green); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 800; letter-spacing: 0.3px;
    padding: 16px; cursor: pointer; transition: opacity 0.15s;
  }
  .complete-workout-btn:active { opacity: 0.8; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; border-radius: 20px;
    padding: 10px 20px; font-size: 14px; font-weight: 600;
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .scroll-top { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; z-index: 150; }

  svg { display: block; }
</style>
</head>
<body>

<header id="app-header">
  <div>
    <div id="header-title">HC 1.2</div>
    <div id="header-phase">Loading...</div>
  </div>
  <div style="text-align:right">
    <div id="header-week" style="font-size:13px;font-weight:700;"></div>
    <div id="header-day" style="font-size:11px;color:var(--text3);margin-top:1px;"></div>
  </div>
</header>

<main id="app-main">
  <!-- TODAY VIEW -->
  <div id="view-today" class="view active">
    <div class="today-hero">
      <div class="phase-badge" id="hero-phase">Phase 1</div>
      <h2 id="hero-day">Monday Upper</h2>
      <div class="subtitle" id="hero-sub">Week 1 · 8×5 Cluster</div>
      <button class="start-btn" onclick="startWorkout()">Start Today's Workout →</button>
    </div>

    <div class="section-header">Select Day</div>
    <div class="day-selector" id="day-selector"></div>

    <div class="section-header">Select Week</div>
    <div class="week-selector" id="week-selector"></div>

    <div class="section-header">Quick Stats</div>
    <div id="quick-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;"></div>
  </div>

  <!-- WORKOUT VIEW -->
  <div id="view-workout" class="view">
    <button onclick="switchView('today')" style="display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px;">
      ← Back
    </button>
    <div id="workout-content"></div>
  </div>

  <!-- PROGRAM VIEW -->
  <div id="view-program" class="view">
    <div id="program-content"></div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view">
    <div id="history-content"></div>
  </div>

  <!-- 1RM VIEW -->
  <div id="view-orm" class="view">
    <div class="section-header" style="margin-top:0">1RM Calculator</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5;">
      Enter your 3-rep max weight to calculate estimated 1RM and training percentages.
    </p>
    <div id="orm-cards"></div>
  </div>
</main>

<!-- REST TIMER OVERLAY -->
<div id="rest-overlay">
  <div id="rest-title">Rest Timer</div>
  <div id="rest-exercise"></div>
  <div id="rest-ring">
    <svg viewBox="0 0 180 180" width="180" height="180">
      <circle class="bg" cx="90" cy="90" r="80"/>
      <circle class="fg" id="rest-arc" cx="90" cy="90" r="80"/>
    </svg>
    <div id="rest-count">0</div>
  </div>
  <div id="rest-next"></div>
  <button id="rest-skip" onclick="skipRest()">Skip Rest</button>
</div>

<!-- BOTTOM NAV -->
<nav id="app-nav">
  <div class="nav-tab active" data-view="today" onclick="switchView('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Today
  </div>
  <div class="nav-tab" data-view="program" onclick="switchView('program')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Program
  </div>
  <div class="nav-tab" data-view="history" onclick="switchView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    History
  </div>
  <div class="nav-tab" data-view="orm" onclick="switchView('orm')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    1RM Calc
  </div>
</nav>

<div id="toast"></div>


<script>
// ════════════════════════════════════════════════════════════
// WORKOUT DATA
// ════════════════════════════════════════════════════════════
const PROGRAM = {
  phases: [
    {

const REST_TIMES = {

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let state = {
  currentWeek: 1,
  currentDayIdx: 0, // 0=Mon,1=Tue,2=Thu,3=Fri
  activeView: 'today'
};

function getPhaseForWeek(w) {
  if (w <= 3) return PROGRAM.phases[0];
  if (w <= 6) return PROGRAM.phases[1];
  return PROGRAM.phases[2];
}
function getWeekInPhase(w) {
  if (w <= 3) return w - 1;
  if (w <= 6) return w - 4;
  return w - 7;
}

// ── localStorage helpers ──
function ls(key, def) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function loadState() {
  const s = ls('hc_state', null);
  if (s) { state.currentWeek = s.currentWeek || 1; state.currentDayIdx = s.currentDayIdx || 0; }
}
function saveState() {
  lsSet('hc_state', { currentWeek: state.currentWeek, currentDayIdx: state.currentDayIdx });
}

// Weight log: key = "weight_exId_week"
function getWeight(exId, week) { return ls(`w_${exId}_${week}`, ''); }
function setWeight(exId, week, val) { lsSet(`w_${exId}_${week}`, val); }

// Set completion: key = "sets_exId_week_day"
function getSets(exId, week) { return ls(`sets_${exId}_${week}`, []); }
function saveSets(exId, week, arr) { lsSet(`sets_${exId}_${week}`, arr); }

// History
function getHistory() { return ls('hc_history', []); }
function addHistory(entry) {
  const h = getHistory();
  h.unshift(entry);
  lsSet('hc_history', h.slice(0, 100));
}

// 1RM values
function get1RM(name) { return ls(`orm_${name}`, ''); }
function set1RM(name, val) { lsSet(`orm_${name}`, val); }

// ════════════════════════════════════════════════════════════
// REST TIMER
// ════════════════════════════════════════════════════════════
let restTimer = null;
let restRemaining = 0;
let restTotal = 0;

const CIRCUMFERENCE = 2 * Math.PI * 80; // r=80

function startRest(seconds, exerciseName, nextInfo) {
  clearInterval(restTimer);
  restTotal = seconds;
  restRemaining = seconds;
  document.getElementById('rest-arc').style.strokeDasharray = CIRCUMFERENCE;
  document.getElementById('rest-exercise').textContent = exerciseName;
  document.getElementById('rest-next').textContent = nextInfo || '';
  updateRestDisplay();
  document.getElementById('rest-overlay').classList.add('show');
  restTimer = setInterval(() => {
    restRemaining--;
    updateRestDisplay();
    if (restRemaining <= 0) {
      clearInterval(restTimer);
      document.getElementById('rest-overlay').classList.remove('show');
      // vibrate
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  }, 1000);
}

function updateRestDisplay() {
  document.getElementById('rest-count').textContent = restRemaining;
  const progress = restRemaining / restTotal;
  const offset = CIRCUMFERENCE * (1 - progress);
  document.getElementById('rest-arc').style.strokeDashoffset = offset;
  // Color shift
  const arc = document.getElementById('rest-arc');
  if (restRemaining <= 10) arc.style.stroke = '#f54242';
  else if (restRemaining <= 20) arc.style.stroke = '#f5922a';
  else arc.style.stroke = '#f5c842';
}

function skipRest() {
  clearInterval(restTimer);
  document.getElementById('rest-overlay').classList.remove('show');
}

// ════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════
function switchView(viewName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`view-${viewName}`).classList.add('active');
  const navTab = document.querySelector(`[data-view="${viewName}"]`);
  if (navTab) navTab.classList.add('active');
  state.activeView = viewName;

  if (viewName === 'today') renderToday();
  if (viewName === 'program') renderProgram();
  if (viewName === 'history') renderHistory();
  if (viewName === 'orm') renderORM();
  updateHeader();
  window.scrollTo(0, 0);
}

function updateHeader() {
  const phase = getPhaseForWeek(state.currentWeek);
  const dayData = getCurrentDayData();
  document.getElementById('header-phase').textContent = `${phase.name} · ${phase.scheme}`;
  document.getElementById('header-week').textContent = `Week ${state.currentWeek}`;
  document.getElementById('header-day').textContent = dayData ? `${dayData.label} ${dayData.name}` : '';
}

// ════════════════════════════════════════════════════════════
function getCurrentDayData() {
  const phase = getPhaseForWeek(state.currentWeek);
  return phase.days[state.currentDayIdx] || phase.days[0];
}

function renderToday() {
  const phase = getPhaseForWeek(state.currentWeek);
  const dayData = getCurrentDayData();
  const wi = getWeekInPhase(state.currentWeek);

  document.getElementById('hero-phase').textContent = `${phase.name}`;
  document.getElementById('hero-day').textContent = `${dayData.label} ${dayData.name}`;
  document.getElementById('hero-sub').textContent = `Week ${state.currentWeek} · ${phase.scheme} Cluster`;

  // Day selector
  const daySel = document.getElementById('day-selector');
  daySel.innerHTML = '';
  phase.days.forEach((d, i) => {
    const completed = ls(`wk_done_${state.currentWeek}_${d.id}`, false);
    const btn = document.createElement('div');
    btn.className = `day-btn${i === state.currentDayIdx ? ' active' : ''}${completed ? ' completed' : ''}`;
    btn.innerHTML = `<div class="day-label">${d.label.slice(0,3)}</div><div class="day-name">${d.name}</div>`;
    btn.onclick = () => {
      state.currentDayIdx = i;
      saveState();
      renderToday();
      updateHeader();
    };
    daySel.appendChild(btn);
  });

  // Week selector
  const weekSel = document.getElementById('week-selector');
  weekSel.innerHTML = '';
  [1,2,3,4,5,6,7,8].forEach(w => {
    const ph = getPhaseForWeek(w);
    const completed = ls(`week_done_${w}`, false);
    const btn = document.createElement('div');
    btn.className = `week-btn${w === state.currentWeek ? ' active' : ''}${completed ? ' completed' : ''}`;
    btn.textContent = `W${w}`;
    btn.title = ph.name;
    btn.onclick = () => {
      state.currentWeek = w;
      state.currentDayIdx = 0;
      saveState();
      renderToday();
      updateHeader();

  });

  // Quick stats
  const qs = document.getElementById('quick-stats');
  const bench = get1RM('Bench Press');
  const squat = get1RM('Squat');
  const stats = [
    { label: 'Current Phase', value: phase.name },
    { label: 'Cluster Scheme', value: phase.scheme },
    { label: 'Bench 1RM', value: bench ? `${bench} lbs` : 'Not set' },
    { label: 'Squat 1RM', value: squat ? `${squat} lbs` : 'Not set' },
  ];
  qs.innerHTML = stats.map(s => `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;">
      <div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">${s.label}</div>
      <div style="font-size:16px;font-weight:800;">${s.value}</div>
    </div>
  `).join('');
}

function renderWorkout() {
  const phase = getPhaseForWeek(state.currentWeek);
  const dayData = getCurrentDayData();
  const wi = getWeekInPhase(state.currentWeek);
  const container = document.getElementById('workout-content');

  // Group exercises into supersets and singles
  const groups = groupExercises(dayData.exercises);

  let html = `
    <div style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span style="background:var(--yellow);color:#000;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;">${phase.name}</span>

      </div>
      <h2 style="font-size:22px;font-weight:800;">${dayData.label} ${dayData.name}</h2>
      <p style="font-size:13px;color:var(--text2);margin-top:2px;">Week ${state.currentWeek}</p>
    </div>
  `;

  // Section labels
  const sectionLabels = {cns:'CNS Activation', yellow:'Primary Cluster Sets', orange:'Accessory Work', red:'Pump / Finishers'};
  let lastSection = null;

  groups.forEach(group => {
    const firstType = group[0].type;
    if (firstType !== lastSection) {
      lastSection = firstType;
      html += `<div class="section-header">${sectionLabels[firstType] || ''}</div>`;
    }

    if (group.length > 1) {
      html += `<div class="superset-group">`;
      group.forEach((ex, gi) => {
        if (gi > 0) html += `<div class="superset-label">+ SUPERSET</div>`;
        html += renderExCard(ex, wi);
      });
      html += `</div>`;
    } else {
      html += renderExCard(group[0], wi);
    }
  });

  html += `<button class="complete-workout-btn" onclick="completeWorkout()">Complete Workout ✓</button>`;

  container.innerHTML = html;

  // Bind set circles
  dayData.exercises.forEach(ex => {
    const completedSets = getSets(ex.id, state.currentWeek);
    for (let i = 0; i < ex.sets; i++) {
      const circle = document.getElementById(`set-${ex.id}-${i}`);
      if (circle) {
        if (completedSets.includes(i)) circle.classList.add('done');
        circle.addEventListener('click', () => handleSetClick(ex, i, dayData.name));
      }
    }
    // Weight input
    const weightInput = document.getElementById(`weight-${ex.id}`);
    if (weightInput) {
      weightInput.value = getWeight(ex.id, state.currentWeek);
      weightInput.addEventListener('change', () => {
        setWeight(ex.id, state.currentWeek, weightInput.value);
      });
    }
  });
}

function groupExercises(exercises) {
  const groups = [];
  const used = new Set();
  exercises.forEach(ex => {
    if (used.has(ex.id)) return;
    if (ex.superset) {
      const group = exercises.filter(e => e.superset === ex.superset);
      group.forEach(e => used.add(e.id));
      groups.push(group);
    } else {
      used.add(ex.id);
      groups.push([ex]);
    }
  });
  return groups;
}

function handleSetClick(ex, setIdx, dayName) {
  const completedSets = getSets(ex.id, state.currentWeek);
  const circle = document.getElementById(`set-${ex.id}-${setIdx}`);
  if (!circle) return;

  if (completedSets.includes(setIdx)) {
    // Un-complete
    const newSets = completedSets.filter(s => s !== setIdx);
    saveSets(ex.id, state.currentWeek, newSets);
    circle.classList.remove('done');
    return;
  }

  // Complete the set
  completedSets.push(setIdx);
  saveSets(ex.id, state.currentWeek, completedSets);
  circle.classList.add('done');
  if (navigator.vibrate) navigator.vibrate(50);

  // Determine rest time
  let restSecs = REST_TIMES.orange;
  if (ex.type === 'cns') restSecs = REST_TIMES.cns;
  else if (ex.type === 'yellow') {
    restSecs = (dayName === 'Lower' || dayName === 'Total') ? REST_TIMES.yellow_lower : REST_TIMES.yellow_upper;
  } else if (ex.type === 'red') restSecs = REST_TIMES.red;

  // Don't start rest after last set
  if (setIdx < ex.sets - 1 || ex.type === 'yellow') {
    const nextSet = setIdx + 1;
    const nextInfo = nextSet < ex.sets ? `Next: Set ${nextSet + 1} of ${ex.sets}` : 'Last set done!';
    startRest(restSecs, ex.name, nextInfo);
  }
}

function completeWorkout() {
  const phase = getPhaseForWeek(state.currentWeek);
  const dayData = getCurrentDayData();
  const wi = getWeekInPhase(state.currentWeek);

  // Collect weights
  const weights = {};
  dayData.exercises.forEach(ex => {
    const w = getWeight(ex.id, state.currentWeek);
    if (w) weights[ex.name] = w;
  });

  const entry = {
    date: new Date().toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}),
    dateRaw: Date.now(),
    phase: phase.name,
    week: state.currentWeek,
    day: `${dayData.label} ${dayData.name}`,
    weights
  };
  addHistory(entry);

  // Mark day done
  lsSet(`wk_done_${state.currentWeek}_${dayData.id}`, true);

  showToast('Workout complete! 💪');

  // Advance to next day
  if (state.currentDayIdx < phase.days.length - 1) {
    state.currentDayIdx++;
  } else {
    state.currentDayIdx = 0;
    if (state.currentWeek < 8) {
      state.currentWeek++;
      lsSet(`week_done_${state.currentWeek - 1}`, true);
    }
  }
  saveState();
  switchView('today');
}

function renderProgram() {
  let html = '';
  PROGRAM.phases.forEach(phase => {
    const weekRange = `Weeks ${phase.weeks[0]}–${phase.weeks[phase.weeks.length-1]}`;
    html += `
      <div class="phase-card">
        <div class="phase-header">
          <div>
            <h3>${phase.name}</h3>
            <div class="phase-scheme">${phase.scheme}</div>
          </div>
          <div class="phase-weeks">${weekRange}</div>
        </div>
        <div class="phase-days">
          ${phase.days.map(day => {
            const totalEx = day.exercises.length;
            const yellow = day.exercises.filter(e=>e.type==='yellow').length;
            return `
              <div class="phase-day-card" onclick="viewProgramDay(${phase.id}, '${day.id}')">
                <div class="pdc-day">${day.label}</div>
                <div class="pdc-name">${day.name}</div>
                <div class="pdc-count">${totalEx} exercises · ${yellow} cluster lifts</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });
  document.getElementById('program-content').innerHTML = html;
}

function viewProgramDay(phaseId, dayId) {
  const phase = PROGRAM.phases.find(p => p.id === phaseId);
  const day = phase.days.find(d => d.id === dayId);
  if (!phase || !day) return;

  // Load this day into workout view
  const origWeek = state.currentWeek;
  const origDayIdx = state.currentDayIdx;

  // Temporarily set state
  state.currentWeek = phase.weeks[0];
  state.currentDayIdx = phase.days.indexOf(day);
  saveState();
  switchView('workout');
  renderWorkout();
}

// ════════════════════════════════════════════════════════════
// HISTORY VIEW
// ════════════════════════════════════════════════════════════
function renderHistory() {
  const history = getHistory();
  let html = '';

  // Charts for main lifts
  const mainLifts = ['Bench Press','DB Bench Press','Front Squat','High Bar Back Squat','Low Bar Back Squat','Deadlift','Sumo / Semi-Sumo Deadlift','Trap Bar Deadlift'];

  // Build data sets
  const liftData = {};
  history.forEach(session => {
    Object.entries(session.weights || {}).forEach(([name, weight]) => {
      const norm = mainLifts.find(l => name.toLowerCase().includes(l.toLowerCase().split(' ')[0]));
      if (norm) {
        if (!liftData[norm]) liftData[norm] = [];
        liftData[norm].push({ date: session.date, weight: parseFloat(weight), dateRaw: session.dateRaw });
      }
    });
  });

  // Compact chart data by top lifts
  const chartLifts = Object.entries(liftData).filter(([,arr]) => arr.length >= 2).slice(0,3);
  if (chartLifts.length > 0) {
    html += `<div class="section-header" style="margin-top:0">Progress Charts</div>`;
    chartLifts.forEach(([name, data]) => {
      const sorted = data.sort((a,b) => a.dateRaw - b.dateRaw);
      html += `<div class="chart-section"><div class="chart-title">${name}</div><div class="chart-wrap">${renderChart(sorted)}</div></div>`;
    });
  }

  html += `<div class="section-header">${history.length > 0 ? 'Past Workouts' : ''}</div>`;

  if (history.length === 0) {
    html += `<div class="history-empty"><div style="font-size:48px;margin-bottom:12px;">🏋️</div><div style="font-size:16px;font-weight:700;color:var(--text2);">No workouts yet</div><div style="font-size:13px;margin-top:8px;">Complete your first session to see history here.</div></div>`;
  } else {
    history.forEach(session => {
      const weights = Object.entries(session.weights || {});
      html += `
        <div class="history-item">
          <div class="hi-header">
            <div class="hi-date">${session.date}</div>
            <div class="hi-badge">${session.day} · W${session.week}</div>
          </div>
          ${weights.length > 0 ? `<div class="hi-weights">${weights.map(([name,w]) => `<div class="hi-weight-row"><span>${name}</span><strong>${w} lbs</strong></div>`).join('')}</div>` : '<div style="font-size:12px;color:var(--text3);">No weights logged</div>'}
        </div>
      `;
    });
  }

  document.getElementById('history-content').innerHTML = html;
}

function renderChart(data) {
  if (data.length < 2) return '<div style="color:var(--text3);font-size:12px;">Need more data</div>';
  const W = 300, H = 100, PAD = 20;
  const weights = data.map(d => d.weight);
  const minW = Math.min(...weights), maxW = Math.max(...weights);
  const range = maxW - minW || 1;

  const pts = data.map((d, i) => {
    const x = PAD + (i / (data.length - 1)) * (W - PAD*2);
    const y = H - PAD - ((d.weight - minW) / range) * (H - PAD*2);
    return `${x},${y}`;
  });

  const pathD = pts.map((p,i) => (i===0?'M':'L') + p).join(' ');
  const areaD = `${pathD} L${pts[pts.length-1].split(',')[0]},${H-PAD} L${PAD},${H-PAD} Z`;

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible">
      <defs>
        <linearGradient id="grad-${data[0].dateRaw}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--yellow)" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="var(--yellow)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#grad-${data[0].dateRaw})"/>
      <path d="${pathD}" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${data.map((d,i) => {
        const [x,y] = pts[i].split(',');
        return `<circle cx="${x}" cy="${y}" r="4" fill="var(--yellow)"/>`;
      }).join('')}
      <text x="${PAD}" y="${H}" fill="var(--text3)" font-size="9">${data[0].date}</text>
      <text x="${W-PAD}" y="${H}" fill="var(--text3)" font-size="9" text-anchor="end">${data[data.length-1].date}</text>
      <text x="${PAD}" y="${PAD}" fill="var(--text2)" font-size="10" font-weight="700">${maxW} lbs</text>
      <text x="${PAD}" y="${H-PAD+4}" fill="var(--text3)" font-size="10">${minW} lbs</text>
    </svg>
  `;
}

// ════════════════════════════════════════════════════════════
// 1RM VIEW
// ════════════════════════════════════════════════════════════
const ORM_EXERCISES = [
  'Bench Press', 'Squat', 'Deadlift', 'Overhead Press', 'Front Squat', 'Trap Bar Deadlift'
];

function renderORM() {
  let html = '';
  ORM_EXERCISES.forEach(name => {
    const stored1RM = get1RM(name);
    const pcts = stored1RM ? calcPcts(parseFloat(stored1RM)) : null;
    html += `
      <div class="orm-card">
        <h3>${name}</h3>
        <div class="orm-input-row">
          <label>3RM Weight (lbs)</label>
          <input class="orm-input" type="number" id="orm-input-${name.replace(/\s/g,'_')}" placeholder="0" min="0" step="2.5" value="">
          <button class="orm-calc-btn" onclick="calcORM('${name}')">Calc</button>
        </div>
        <div class="orm-result ${stored1RM ? 'show' : ''}" id="orm-result-${name.replace(/\s/g,'_')}">
          <div class="orm-1rm">${stored1RM || 0} <span>lbs estimated 1RM</span></div>
          <div class="orm-pcts">
            ${[65,70,75,80,85].map(pct => {
              const val = stored1RM ? Math.round(parseFloat(stored1RM) * pct / 100 / 2.5) * 2.5 : '—';
              return `<div class="orm-pct-item"><div class="pct-label">${pct}%</div><div class="pct-val">${val}</div></div>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  });
  document.getElementById('orm-cards').innerHTML = html;
}

function calcPcts(oneRM) {
  return [65,70,75,80,85].map(pct => Math.round(oneRM * pct / 100 / 2.5) * 2.5);
}

function calcORM(name) {
  const key = name.replace(/\s/g,'_');
  const input = document.getElementById(`orm-input-${key}`);
  const val = parseFloat(input.value);
  if (!val || val <= 0) { showToast('Enter a valid weight'); return; }
  // Epley: 1RM = weight × (1 + 3/30)
  const estimated = Math.round(val * (1 + 3/30) / 2.5) * 2.5;
  set1RM(name, estimated);

  const resultDiv = document.getElementById(`orm-result-${key}`);
  resultDiv.classList.add('show');
  resultDiv.querySelector('.orm-1rm').innerHTML = `${estimated} <span>lbs estimated 1RM</span>`;
  const pctDivs = resultDiv.querySelectorAll('.pct-val');
  [65,70,75,80,85].forEach((pct, i) => {
    const val = Math.round(estimated * pct / 100 / 2.5) * 2.5;
    pctDivs[i].textContent = val;
  });

  showToast(`${name}: ~${estimated} lbs 1RM`);
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}


// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
function init() {
  loadState();
  renderToday();
  updateHeader();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

init();
</script>
